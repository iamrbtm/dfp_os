x-env-app: &env-app
  FLASK_ENV: ${FLASK_ENV:-production}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
  APP_NAME: ${APP_NAME:-Dude Fish OS}
  APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL must be set}
  DATABASE_URL: mysql+pymysql://${MARIADB_USER:?MARIADB_USER must be set}:${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set}@db:3306/${MARIADB_DATABASE:?MARIADB_DATABASE must be set}
  ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://audit-redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://audit-redis:6379/1}
  AUDIT_LOG_BASE_URL: http://audit-log:8090
  AUDIT_LOG_TOKEN: ${AUDIT_LOG_TOKEN:?AUDIT_LOG_TOKEN must be set}
  AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-false}
  FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-s3}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://seaweedfs:8333}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  S3_AUTO_CREATE_BUCKETS: ${S3_AUTO_CREATE_BUCKETS:-true}
  RECEIPT_STORAGE_BUCKET: ${RECEIPT_STORAGE_BUCKET:-receipts}
  MARKET_DOCUMENTS_BUCKET: ${MARKET_DOCUMENTS_BUCKET:-markets}
  PRODUCT_ASSETS_BUCKET: ${PRODUCT_ASSETS_BUCKET:-products}
  RECEIPT_STORAGE_PATH: ${RECEIPT_STORAGE_PATH:-uploads/receipts}
  MARKET_DOCUMENTS_PATH: ${MARKET_DOCUMENTS_PATH:-uploads/markets}
  PRODUCT_ASSETS_PATH: ${PRODUCT_ASSETS_PATH:-uploads/products}
  RECEIPT_OCR_PROVIDER: ${RECEIPT_OCR_PROVIDER:-tesseract}
  RECEIPT_AI_PROVIDER: ${RECEIPT_AI_PROVIDER:-openai}
  AI_RECEIPT_PARSING_ENABLED: ${AI_RECEIPT_PARSING_ENABLED:-false}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  OPENAI_MODEL_RECEIPTS: ${OPENAI_MODEL_RECEIPTS:-gpt-4o-mini}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
  OLLAMA_FALLBACK_URL: ${OLLAMA_FALLBACK_URL:-http://localhost:11434}
  OLLAMA_RECEIPT_MODEL: ${OLLAMA_RECEIPT_MODEL:-llama3}
  RECEIPT_DUPLICATE_STRICTNESS: ${RECEIPT_DUPLICATE_STRICTNESS:-normal}

x-depends-all: &depends-all
  db:
    condition: service_healthy
  audit-redis:
    condition: service_healthy
  seaweedfs:
    condition: service_healthy

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:?MARIADB_DATABASE must be set}
      MARIADB_USER: ${MARIADB_USER:?MARIADB_USER must be set}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set}
    expose:
      - "3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:3.85
    command: "server -dir=/data -s3"
    environment:
      S3_ENABLE_AUTH: "true"
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    expose:
      - "8333"
      - "9333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - audit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    mem_limit: 1024m
    environment:
      <<: *env-app
    ports:
      - "5000:5000"
    volumes:
      - receipt_uploads:/app/uploads/receipts
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    mem_limit: 1024m
    environment:
      <<: *env-app
    volumes:
      - receipt_uploads:/app/uploads/receipts
    depends_on: *depends-all
    command: ["uv", "run", "celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info"]

  beat:
    build: .
    mem_limit: 1024m
    environment:
      <<: *env-app
    volumes:
      - receipt_uploads:/app/uploads/receipts
    depends_on: *depends-all
    command: ["uv", "run", "celery", "-A", "app.celery_app.celery", "beat", "--loglevel=info"]

  migrate:
    build: .
    profiles:
      - release
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      DATABASE_URL: mysql+pymysql://${MARIADB_USER:?MARIADB_USER must be set}:${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set}@db:3306/${MARIADB_DATABASE:?MARIADB_DATABASE must be set}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations/versions:/app/migrations/versions
    command: ["uv", "run", "flask", "--app", "app:create_app", "db", "upgrade"]

  audit-postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${AUDIT_POSTGRES_DB:?AUDIT_POSTGRES_DB must be set}
      POSTGRES_USER: ${AUDIT_POSTGRES_USER:?AUDIT_POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD must be set}
    expose:
      - "5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-log:
    build: services/audit-log
    environment:
      AUDIT_SERVICE_ENV: ${AUDIT_SERVICE_ENV:-production}
      AUDIT_SERVICE_NAME: ${AUDIT_SERVICE_NAME:-dfp-audit-log}
      AUDIT_API_HOST: 0.0.0.0
      AUDIT_API_PORT: 8090
      AUDIT_DATABASE_URL: postgresql+asyncpg://${AUDIT_POSTGRES_USER:?AUDIT_POSTGRES_USER must be set}:${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD must be set}@audit-postgres:5432/${AUDIT_POSTGRES_DB:?AUDIT_POSTGRES_DB must be set}
      AUDIT_REDIS_URL: redis://audit-redis:6379/0
      AUDIT_INTERNAL_API_TOKEN: ${AUDIT_LOG_TOKEN:?AUDIT_LOG_TOKEN must be set}
      AUDIT_HASH_SECRET: ${AUDIT_HASH_SECRET:?AUDIT_HASH_SECRET must be set}
      AUDIT_USE_REDIS_STREAM: ${AUDIT_USE_REDIS_STREAM:-false}
      AUDIT_LOG_LEVEL: ${AUDIT_LOG_LEVEL:-INFO}
    expose:
      - "8090"
    depends_on:
      audit-postgres:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8090"]

  intelligence-postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${INTELLIGENCE_POSTGRES_DB:?INTELLIGENCE_POSTGRES_DB must be set}
      POSTGRES_USER: ${INTELLIGENCE_POSTGRES_USER:?INTELLIGENCE_POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${INTELLIGENCE_POSTGRES_PASSWORD:?INTELLIGENCE_POSTGRES_PASSWORD must be set}
    expose:
      - "5432"
    volumes:
      - intelligence_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  intelligence:
    build: services/intelligence
    environment:
      INTELLIGENCE_SERVICE_ENV: ${INTELLIGENCE_SERVICE_ENV:-production}
      INTELLIGENCE_SERVICE_NAME: ${INTELLIGENCE_SERVICE_NAME:-dfp-intelligence}
      INTELLIGENCE_API_HOST: 0.0.0.0
      INTELLIGENCE_API_PORT: 8091
      INTELLIGENCE_DATABASE_URL: postgresql+asyncpg://${INTELLIGENCE_POSTGRES_USER:?INTELLIGENCE_POSTGRES_USER must be set}:${INTELLIGENCE_POSTGRES_PASSWORD:?INTELLIGENCE_POSTGRES_PASSWORD must be set}@intelligence-postgres:5432/${INTELLIGENCE_POSTGRES_DB:?INTELLIGENCE_POSTGRES_DB must be set}
      INTELLIGENCE_INTERNAL_API_TOKEN: ${INTELLIGENCE_INTERNAL_API_TOKEN:?INTELLIGENCE_INTERNAL_API_TOKEN must be set}
      INTELLIGENCE_AUDIT_LOG_BASE_URL: http://audit-log:8090
      INTELLIGENCE_AUDIT_LOG_TOKEN: ${AUDIT_LOG_TOKEN:?AUDIT_LOG_TOKEN must be set}
    expose:
      - "8091"
    depends_on:
      intelligence-postgres:
        condition: service_healthy
      audit-log:
        condition: service_started
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8091"]

  test:
    build:
      context: .
      target: dev
    profiles:
      - test
    environment:
      FLASK_ENV: testing
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "pytest", "-v", "--tb=long"]

  api-docs:
    profiles:
      - docs
    build: services/dfpos-api-docs
    environment:
      DFPOS_OPENAPI_URL: http://web:5000/api/openapi.json
      APP_NAME: Dude Fish OS API Reference
      REDOC_THEME: light
      DOCS_USERNAME: ${DOCS_USERNAME:?DOCS_USERNAME must be set}
      DOCS_PASSWORD: ${DOCS_PASSWORD:?DOCS_PASSWORD must be set}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - web

volumes:
  mariadb_data:
  receipt_uploads:
  seaweedfs_data:
  audit_postgres_data:
  intelligence_postgres_data:
  audit_redis_data:
