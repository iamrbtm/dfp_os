services:
  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://username:password@db:3306/dudefish_os
      AUDIT_LOG_BASE_URL: http://audit-log:8090
      AUDIT_LOG_TOKEN: ${AUDIT_LOG_TOKEN:-change-me-audit-token}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-false}
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-s3}
      RECEIPT_STORAGE_PATH: ${RECEIPT_STORAGE_PATH:-uploads/receipts}
      MARKET_DOCUMENTS_PATH: ${MARKET_DOCUMENTS_PATH:-uploads/markets}
      PRODUCT_ASSETS_PATH: ${PRODUCT_ASSETS_PATH:-uploads/products}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://seaweedfs:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-change-me-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-secret-key}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_AUTO_CREATE_BUCKETS: ${S3_AUTO_CREATE_BUCKETS:-true}
      RECEIPT_STORAGE_BUCKET: ${RECEIPT_STORAGE_BUCKET:-receipts}
      MARKET_DOCUMENTS_BUCKET: ${MARKET_DOCUMENTS_BUCKET:-markets}
      PRODUCT_ASSETS_BUCKET: ${PRODUCT_ASSETS_BUCKET:-products}
      RECEIPT_OCR_PROVIDER: ${RECEIPT_OCR_PROVIDER:-tesseract}
      RECEIPT_AI_PROVIDER: ${RECEIPT_AI_PROVIDER:-openai}
      AI_RECEIPT_PARSING_ENABLED: ${AI_RECEIPT_PARSING_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODEL_RECEIPTS: ${OPENAI_MODEL_RECEIPTS:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_FALLBACK_URL: ${OLLAMA_FALLBACK_URL:-http://localhost:11434}
      OLLAMA_RECEIPT_MODEL: ${OLLAMA_RECEIPT_MODEL:-llama3}
      RECEIPT_DUPLICATE_STRICTNESS: ${RECEIPT_DUPLICATE_STRICTNESS:-normal}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://audit-redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://audit-redis:6379/1}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - web_venv:/opt/venv
      - web_node_modules:/app/node_modules
      - receipt_uploads:/app/uploads/receipts
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      audit-redis:
        condition: service_healthy
    command: >
      /bin/sh -c
      "npm install &&
      npm run build:css &&
      for i in $$(seq 1 30); do
        uv run flask --app app:create_app db upgrade && break;
        echo 'Waiting for database...' && sleep 2;
      done &&
      uv run gunicorn -b 0.0.0.0:5000 'app:create_app()'"

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: dudefish_os
      MARIADB_USER: username
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uusername -ppassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -dir=/data -s3"
    environment:
      S3_ENABLE_AUTH: "true"
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-change-me-access-key}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-change-me-secret-key}
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs-init:
    image: amazon/aws-cli:2.27.50
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-change-me-access-key}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-change-me-secret-key}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://seaweedfs:8333}
      RECEIPT_STORAGE_BUCKET: ${RECEIPT_STORAGE_BUCKET:-receipts}
      MARKET_DOCUMENTS_BUCKET: ${MARKET_DOCUMENTS_BUCKET:-markets}
      PRODUCT_ASSETS_BUCKET: ${PRODUCT_ASSETS_BUCKET:-products}
    depends_on:
      seaweedfs:
        condition: service_started
    restart: "no"
    command: >
      /bin/sh -c "
      until aws --endpoint-url $$S3_ENDPOINT_URL s3api list-buckets >/dev/null 2>&1; do
        echo 'Waiting for SeaweedFS S3 endpoint...';
        sleep 2;
      done;
      aws --endpoint-url $$S3_ENDPOINT_URL s3api create-bucket --bucket $$RECEIPT_STORAGE_BUCKET 2>/dev/null || true;
      aws --endpoint-url $$S3_ENDPOINT_URL s3api create-bucket --bucket $$MARKET_DOCUMENTS_BUCKET 2>/dev/null || true;
      aws --endpoint-url $$S3_ENDPOINT_URL s3api create-bucket --bucket $$PRODUCT_ASSETS_BUCKET 2>/dev/null || true;
      aws --endpoint-url $$S3_ENDPOINT_URL s3api list-buckets
      "

  audit-postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: dfp_audit
      POSTGRES_USER: dfp_audit
      POSTGRES_PASSWORD: dfp_audit_password
    ports:
      - "5432:5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfp_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - audit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://username:password@db:3306/dudefish_os
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://audit-redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://audit-redis:6379/1}
      AUDIT_LOG_BASE_URL: http://audit-log:8090
      AUDIT_LOG_TOKEN: ${AUDIT_LOG_TOKEN:-change-me-audit-token}
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://seaweedfs:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-change-me-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-secret-key}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_AUTO_CREATE_BUCKETS: ${S3_AUTO_CREATE_BUCKETS:-true}
      RECEIPT_STORAGE_BUCKET: ${RECEIPT_STORAGE_BUCKET:-receipts}
      MARKET_DOCUMENTS_BUCKET: ${MARKET_DOCUMENTS_BUCKET:-markets}
      PRODUCT_ASSETS_BUCKET: ${PRODUCT_ASSETS_BUCKET:-products}
    volumes:
      - .:/app
      - web_venv:/opt/venv
      - receipt_uploads:/app/uploads/receipts
    depends_on:
      db:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    command: >
      /bin/sh -c
      "for i in $$(seq 1 30); do
        uv run flask --app app:create_app db upgrade && break;
        echo 'Waiting for database...' && sleep 2;
      done &&
      uv run celery -A app.celery_app.celery worker --loglevel=info"

  audit-log:
    build: services/audit-log
    env_file:
      - services/audit-log/.env
    ports:
      - "8090:8090"
    depends_on:
      audit-postgres:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
    command: >
      /bin/sh -c
      "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8090"

  api-docs:
    profiles:
      - docs
    build: services/dfpos-api-docs
    env_file:
      - services/dfpos-api-docs/.env
    environment:
      DFPOS_OPENAPI_URL: http://web:5000/api/openapi.json
      APP_NAME: Dude Fish OS API Reference
      REDOC_THEME: light
    ports:
      - "8080:8080"
    depends_on:
      - web

volumes:
  mariadb_data:
  web_venv:
  web_node_modules:
  receipt_uploads:
  seaweedfs_data:
  audit_postgres_data:
  audit_redis_data:
