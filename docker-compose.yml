services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - web_venv:/opt/venv
      - web_node_modules:/app/node_modules
    command: >
      /bin/sh -c
      "npm install &&
      npm run build:css &&
      for i in $$(seq 1 30); do
        uv run flask --app app:create_app db upgrade && break;
        echo 'Waiting for database...' && sleep 2;
      done &&
      uv run gunicorn -b 0.0.0.0:5000 'app:create_app()'"

  db:
    image: mariadb:11
    profiles: ["localdb"]
    environment:
      MARIADB_DATABASE: dudefish_os
      MARIADB_USER: username
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uusername -ppassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-postgres:
    image: postgres:17
    profiles: ["audit"]
    environment:
      POSTGRES_DB: dfp_audit
      POSTGRES_USER: dfp_audit
      POSTGRES_PASSWORD: dfp_audit_password
    ports:
      - "5432:5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfp_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-redis:
    image: redis:7-alpine
    profiles: ["audit"]
    ports:
      - "6379:6379"
    volumes:
      - audit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-log:
    build: services/audit-log
    profiles: ["audit"]
    env_file:
      - services/audit-log/.env
    ports:
      - "8090:8090"
    depends_on:
      audit-postgres:
        condition: service_healthy
      audit-redis:
        condition: service_healthy
    command: >
      /bin/sh -c
      "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8090"

volumes:
  mariadb_data:
  web_venv:
  web_node_modules:
  audit_postgres_data:
  audit_redis_data:
