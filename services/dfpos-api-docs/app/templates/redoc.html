<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — {{ app_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .docs-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: {% if theme == 'dark' %}#1a1a2e{% else %}#ffffff{% endif %};
      border-bottom: 1px solid {% if theme == 'dark' %}#2d2d4e{% else %}#e2e8f0{% endif %};
      {% if theme == 'dark' %}color: #e2e8f0;{% endif %}
    }
    .docs-header h1 { font-size: 18px; font-weight: 600; }
    .docs-header .header-links a {
      margin-left: 16px;
      {% if theme == 'dark' %}color: #93c5fd;{% else %}color: #2563eb;{% endif %}
      text-decoration: none; font-size: 14px;
    }
    .docs-header .header-links a:hover { text-decoration: underline; }
    #redoc-container { height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <div class="docs-header">
    <h1>{{ app_name }}</h1>
    <div class="header-links">
      <a href="{{ url_for('openapi_json') }}" target="_blank">openapi.json</a>
      <a href="{{ url_for('health') }}" target="_blank">Health</a>
    </div>
  </div>
  <div id="redoc-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/redoc@next/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init(
      {{ spec_json|safe }},
      {
        scrollYOffset: 53,
        hideDownloadButton: true,
        expandResponses: "200,201",
        sortPropsAlphabetically: true,
        nativeScrollbars: false,
        theme: {
          sidebar: {
            backgroundColor: {{ '"#1a1a2e"' if theme == 'dark' else '"#f8fafc"' }},
            textColor: {{ '"#e2e8f0"' if theme == 'dark' else '"#1e293b"' }},
          },
          rightPanel: {
            backgroundColor: {{ '"#1e1e3a"' if theme == 'dark' else '"#1e293b"' }},
          },
        },
      },
      document.getElementById('redoc-container')
    );
  </script>
</body>
</html>
