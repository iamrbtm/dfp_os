<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unavailable — API Docs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f8fafc; color: #1e293b;
    }
    .error-card {
      text-align: center; padding: 48px; max-width: 480px;
    }
    .error-card h1 { font-size: 24px; margin-bottom: 12px; }
    .error-card p { font-size: 16px; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
    .error-card .icon { font-size: 48px; margin-bottom: 16px; }
    .error-card .hint {
      font-size: 13px; color: #94a3b8;
      background: #f1f5f9; padding: 12px 16px; border-radius: 8px;
    }
    .error-card .hint code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .error-card a { color: #2563eb; text-decoration: none; }
    .error-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="icon">🔗</div>
    <h1>API Documentation Unavailable</h1>
    <p>{{ message }}</p>
    <div class="hint">
      Ensure the main DFP OS application is running and reachable, or place a valid
      <code>openapi.json</code> at the configured fallback path.
      <br><br>
      <a href="{{ url_for('health') }}">Check health status</a>
    </div>
  </div>
</body>
</html>
