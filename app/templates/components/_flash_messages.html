{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="mb-6 space-y-3">
      {% for category, message in messages %}
        <div class="rounded-2xl border px-4 py-3 text-sm
          {% if category == 'success' %}border-emerald-400/30 bg-emerald-400/10 text-emerald-100{% endif %}
          {% if category == 'warning' %}border-amber-400/30 bg-amber-400/10 text-amber-100{% endif %}
          {% if category == 'danger' %}border-rose-400/30 bg-rose-400/10 text-rose-100{% endif %}
        ">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
