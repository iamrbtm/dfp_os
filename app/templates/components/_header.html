<header class="border-b border-slate-800 bg-slate-950/95 backdrop-blur">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a href="{{ url_for('public.home') }}" class="text-lg font-semibold tracking-tight text-cyan-300">
      {{ app_name }}
    </a>
    <nav class="flex items-center gap-3 text-sm text-slate-200">
      <a href="{{ url_for('public.home') }}" class="rounded-full px-3 py-2 hover:bg-slate-900">Home</a>
      <a href="{{ url_for('public.shop') }}" class="rounded-full px-3 py-2 hover:bg-slate-900">Shop</a>
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard.index') }}" class="rounded-full px-3 py-2 hover:bg-slate-900">Dashboard</a>
        <a href="{{ url_for('products.list_resource', resource_key='products') }}" class="rounded-full px-3 py-2 hover:bg-slate-900">Catalog</a>
        <form action="{{ url_for('auth.logout') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="rounded-full bg-cyan-400 px-4 py-2 font-medium text-slate-950 hover:bg-cyan-300">
            Sign out
          </button>
        </form>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="rounded-full bg-cyan-400 px-4 py-2 font-medium text-slate-950 hover:bg-cyan-300">
          Sign in
        </a>
      {% endif %}
    </nav>
  </div>
</header>
