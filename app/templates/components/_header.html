<header class="app-nav" style="border-bottom: 1px solid var(--color-border);">
  <div class="mx-auto flex w-full max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <a href="{{ url_for('public.home') }}" class="app-link">
        <span class="block text-xs uppercase tracking-[0.32em]" style="color: var(--color-link);">Clarksville, TN</span>
        <span class="block text-2xl font-semibold tracking-tight" style="color: var(--color-text);">{{ app_name }}</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="{{ url_for('public.cart') }}" class="app-btn app-btn-secondary">
          Cart{% if public_cart_count %} ({{ public_cart_count }}){% endif %}
        </a>
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('dashboard.index') }}" class="app-btn app-btn-secondary">Dashboard</a>
          <form action="{{ url_for('auth.logout') }}" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="app-btn app-btn-primary" style="border: none;">Sign out</button>
          </form>
        {% else %}
          <a href="{{ url_for('auth.login') }}" class="app-btn app-btn-primary" style="border: none;">Sign in</a>
        {% endif %}
      </div>
    </div>
    <nav class="flex flex-wrap items-center gap-2 text-sm">
      <a href="{{ url_for('public.home') }}" class="rounded-full px-3 py-2 hover:opacity-80">Home</a>
      <a href="{{ url_for('public.shop') }}" class="rounded-full px-3 py-2 hover:opacity-80">Shop</a>
      <a href="{{ url_for('public.printing_basics') }}" class="rounded-full px-3 py-2 hover:opacity-80">3D Printing Basics</a>
      <a href="{{ url_for('public.custom_orders') }}" class="rounded-full px-3 py-2 hover:opacity-80">Custom Orders</a>
      <a href="{{ url_for('public.market_schedule') }}" class="rounded-full px-3 py-2 hover:opacity-80">Markets</a>
      <a href="{{ url_for('public.about') }}" class="rounded-full px-3 py-2 hover:opacity-80">About</a>
      <a href="{{ url_for('public.faq') }}" class="rounded-full px-3 py-2 hover:opacity-80">FAQ</a>
      <a href="{{ url_for('public.contact') }}" class="rounded-full px-3 py-2 hover:opacity-80">Contact</a>
    </nav>
  </div>
</header>
