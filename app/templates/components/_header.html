<header class="app-nav">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a href="{{ url_for('public.home') }}" class="text-lg font-semibold tracking-tight app-link">
      {{ app_name }}
    </a>
    <nav class="flex items-center gap-3 text-sm">
      <a href="{{ url_for('public.home') }}" class="rounded-full px-3 py-2 hover:opacity-80">Home</a>
      <a href="{{ url_for('public.shop') }}" class="rounded-full px-3 py-2 hover:opacity-80">Shop</a>
      <a href="{{ url_for('public.custom_orders') }}" class="rounded-full px-3 py-2 hover:opacity-80">Custom Orders</a>
      <a href="{{ url_for('public.market_schedule') }}" class="rounded-full px-3 py-2 hover:opacity-80">Markets</a>
      <a href="{{ url_for('public.about') }}" class="rounded-full px-3 py-2 hover:opacity-80">About</a>
      <a href="{{ url_for('public.contact') }}" class="rounded-full px-3 py-2 hover:opacity-80">Contact</a>
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard.index') }}" class="rounded-full px-3 py-2 hover:opacity-80">Dashboard</a>
        <form action="{{ url_for('auth.logout') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="rounded-full px-4 py-2 font-medium app-btn-primary" style="border: none;">
            Sign out
          </button>
        </form>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="rounded-full px-4 py-2 font-medium app-btn-primary" style="border: none;">
          Sign in
        </a>
      {% endif %}
    </nav>
  </div>
</header>
