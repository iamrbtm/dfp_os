<div class="app-context-bar sticky top-0 z-20 px-4 py-2.5 text-sm flex items-center gap-4"
     style="background-color: var(--color-nav-bg); border-bottom: 1px solid var(--color-nav-border); color: var(--color-nav-text);">
  <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-1.5 rounded hover:opacity-80" style="color: var(--color-nav-text);">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <span class="font-semibold" style="color: var(--color-text);">{{ context_title or active_section|title }}</span>
  {% if context_nav_items %}
  <nav class="flex items-center gap-1 ml-2">
    {% for label, url in context_nav_items %}
    <a href="{{ url }}" class="px-3 py-1.5 rounded hover:opacity-80" style="color: var(--color-nav-text);">{{ label }}</a>
    {% endfor %}
  </nav>
  {% endif %}
  {% block context_nav %}{% endblock %}
</div>
