<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <meta name="description" content="Dude Fish OS helps Dude Fish Printing run the shop, sell at markets, and stay organized.">
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/app.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.x.x/dist/htmx.min.js" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    {% include "components/_header.html" %}
    <main class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      {% include "components/_flash_messages.html" %}
      {% block content %}{% endblock %}
    </main>
    {% include "components/_footer.html" %}
    <script src="{{ url_for('static', filename='src/js/app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
