{% extends "base.html" %}
{% block title %}Something Went Wrong | {{ app_name }}{% endblock %}
{% block content %}
  <div class="mx-auto max-w-2xl app-card p-8 text-center">
    <p class="text-sm uppercase tracking-[0.2em]" style="color: var(--color-danger);">500</p>
    <h1 class="mt-3 text-3xl font-semibold" style="color: var(--color-text);">Something went wrong on our side.</h1>
    <p class="mt-3" style="color: var(--color-text-muted);">The app rolled back safely. Please try again in a moment.</p>
  </div>
{% endblock %}
