{% extends "base.html" %}
{% block title %}Access Denied | {{ app_name }}{% endblock %}
{% block content %}
  <div class="mx-auto max-w-2xl app-card p-8 text-center">
    <p class="text-sm uppercase tracking-[0.2em]" style="color: var(--color-warning);">403</p>
    <h1 class="mt-3 text-3xl font-semibold" style="color: var(--color-text);">You don't have access to this page.</h1>
    <p class="mt-3" style="color: var(--color-text-muted);">If you expected to be here, sign in with an account that has permission.</p>
  </div>
{% endblock %}
