{% extends "base.html" %}

{% block title %}{{ resource.singular }} | {{ app_name }}{% endblock %}

{% block content %}
  <section class="space-y-6">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
      <div>
        <p class="text-sm uppercase tracking-[0.2em] text-cyan-300">Phase 2 admin</p>
        <h1 class="mt-2 text-3xl font-semibold text-white">{{ resource.singular }} details</h1>
      </div>
      <div class="flex flex-wrap gap-3">
        <a href="{{ url_for(request.endpoint.replace('detail_resource', 'edit_resource'), resource_key=resource.key, resource_id=instance.id) }}" class="rounded-2xl bg-cyan-400 px-5 py-3 font-medium text-slate-950 hover:bg-cyan-300">
          Edit
        </a>
        <a href="{{ url_for(request.endpoint.replace('detail_resource', 'list_resource'), resource_key=resource.key) }}" class="rounded-2xl border border-slate-700 px-5 py-3 font-medium text-slate-100 hover:bg-slate-800">
          Back to {{ resource.plural }}
        </a>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      {% for detail in details %}
        <article class="rounded-3xl border border-slate-800 bg-slate-900 p-5">
          <p class="text-sm text-slate-400">{{ detail.label }}</p>
          <p class="mt-2 text-lg font-medium text-white">{{ detail.value }}</p>
        </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
