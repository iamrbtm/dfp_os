# Bambu A1 quoting profile — 256mm^3, 0.4mm nozzle, PLA
# Used by PrusaSlicer CLI for cost-estimate slicing only.
# Settings match typical default PLA profile for a 256mm^3 FFF printer.

[print:quoting_0.20mm]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 3
bottom_solid_layers = 3
fill_density = 20%
fill_pattern = cubic
infill_every_layers = 1
solid_infill_every_layers = 0
infill_only_where_needed = 0
solid_infill_below_area = 40
only_retract_when_crossing_perimeters = 1
infill_first = 0
max_print_speed = 80
max_volumetric_speed = 15
perimeter_speed = 50
external_perimeter_speed = 30
infill_speed = 80
solid_infill_speed = 80
top_solid_infill_speed = 40
support_material = 0
support_material_auto = 1
support_material_threshold = 45
skirts = 1
skirt_distance = 6
brim_width = 0
 brim_width_interior = 0
perimeter_extrusion_width = 0.45
external_perimeter_extrusion_width = 0.45
first_layer_extrusion_width = 0.42
infill_extrusion_width = 0.45
solid_infill_extrusion_width = 0.45
top_infill_extrusion_width = 0.40

[filament:quoting_pla]
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 20
filament_type = PLA
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65
filament_max_volumetric_speed = 15
cooling = 1
fan_below_layer_time = 60
slowdown_below_layer_time = 5
min_print_speed = 10

[printer:quoting_a1]
printer_technology = FFF
printer_model = CUSTOM
printer_variant = 0.4
nozzle_diameter = 0.4
bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
gcode_flavor = marlin
z_offset = 0
retract_length = 0.8
retract_lift = 0.4
retract_speed = 30
deretract_speed = 0
retract_before_travel = 2
wipe = 1
retract_layer_change = 1
