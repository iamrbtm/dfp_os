# Bambu X1 Carbon quoting profile — 256mm^3, 0.4mm nozzle, PLA
# Slightly faster speeds than A1 — enclosure, higher flow.
print settings borrowing from quoting_0.20mm with speed adjustments.

[print:quoting_0.20mm]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 3
bottom_solid_layers = 3
fill_density = 20%
fill_pattern = cubic
max_print_speed = 120
max_volumetric_speed = 21
perimeter_speed = 60
external_perimeter_speed = 40
infill_speed = 120
solid_infill_speed = 120
top_solid_infill_speed = 50
support_material = 0
skirts = 1
skirt_distance = 6
brim_width = 0

[filament:quoting_pla]
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 20
filament_type = PLA
temperature = 220
first_layer_temperature = 225
bed_temperature = 65
first_layer_bed_temperature = 70
filament_max_volumetric_speed = 21
cooling = 1

[printer:quoting_x1c]
printer_technology = FFF
printer_model = CUSTOM
printer_variant = 0.4
nozzle_diameter = 0.4
bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
gcode_flavor = marlin
z_offset = 0
retract_length = 0.6
retract_lift = 0.3
retract_speed = 40
retract_before_travel = 2
wipe = 1
